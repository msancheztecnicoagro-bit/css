<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos Familia Cisternas Saavedra</title>

    <!-- Estilos de Tabulator -->
    <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" rel="stylesheet">
    
    <!-- Librerías JS necesarias -->
    <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-light: #f4f6f9;
            --bg-dark: #121212;
            --card-light: #fff;
            --card-dark: #1e1e1e;
            --text-light: #333;
            --text-dark: #f4f6f9;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border-light: #ddd;
            --border-dark: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            margin: 0;
            padding: 15px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1400px;
            margin: auto;
        }

        h1 {
            text-align: center;
            font-size: clamp(1.5rem, 4vw, 2rem);
            margin-bottom: 20px;
        }

        /* --- Tarjetas de Resumen --- */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .card {
            background: var(--card-light);
            padding: 20px 10px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            transition: background-color 0.3s;
            border: 1px solid var(--border-light);
        }

        .card-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .value {
            font-size: clamp(1.1rem, 2.5vw, 1.6rem);
            font-weight: 800;
        }

        .text-blue { color: #2563eb; }
        .text-green { color: #10b981; }
        .text-red { color: #ef4444; }

        body.dark .text-blue { color: #60a5fa; }
        body.dark .text-green { color: #34d399; }
        body.dark .text-red { color: #f87171; }

        /* --- Barra de Filtro --- */
        .filter-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            background: var(--card-light);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-light);
        }

        .filter-bar label { font-weight: bold; }
        .filter-bar input[type="month"] {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-light);
            background: var(--bg-light);
            color: var(--text-light);
            font-size: 1rem;
            font-family: inherit;
        }

        /* --- Botones --- */
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            justify-content: center;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: var(--primary);
            color: white;
            font-weight: bold;
            font-size: 0.95rem;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
        }

        button:hover { background-color: var(--primary-hover); }
        button:active { transform: scale(0.98); }
        
        .btn-secondary { background-color: #4b5563; box-shadow: none; }
        .btn-secondary:hover { background-color: #374151; }
        .btn-outline { background-color: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background-color: var(--primary); color: white; }

        /* --- Tabla y Gráficos --- */
        #table {
            background: var(--card-light);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            margin-bottom: 30px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .chart-container {
            background: var(--card-light);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-light);
            position: relative;
            height: 350px;
        }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
        }

        .modal {
            background: var(--card-light);
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .modal h3 { margin-top: 0; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            background: var(--bg-light);
            color: var(--text-light);
        }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

        /* --- Modo Oscuro --- */
        body.dark { background: var(--bg-dark); color: var(--text-dark); }
        body.dark .card, body.dark #table, body.dark .chart-container, body.dark .modal, 
        body.dark input, body.dark select, body.dark .filter-bar {
            background: var(--card-dark); border-color: var(--border-dark); color: var(--text-dark);
        }
        body.dark .card-title { color: #aaa; }
        body.dark .modal-overlay { background: rgba(0,0,0,0.7); }
        body.dark .btn-outline { border-color: #60a5fa; color: #60a5fa; }
        body.dark .btn-outline:hover { background-color: #60a5fa; color: #121212; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Gastos Familia Cisternas Saavedra</h1>

        <div class="cards">
            <!-- Nueva tarjeta de saldo anterior -->
            <div class="card">
                <div class="card-title">Saldo Anterior</div>
                <div class="value" id="saldo-anterior">$0</div>
            </div>
            <div class="card">
                <div class="card-title">Ingresos Mes</div>
                <div class="value text-green" id="ingresos">$0</div>
            </div>
            <div class="card">
                <div class="card-title">Gastos Mes</div>
                <div class="value text-red" id="gastos">$0</div>
            </div>
            <!-- El Balance Total suma el saldo anterior + movimientos del mes -->
            <div class="card" style="border: 2px solid var(--primary);">
                <div class="card-title">Balance Total</div>
                <div class="value text-blue" id="balance">$0</div>
            </div>
            <!-- El Ahorro Total es acumulativo e histórico -->
            <div class="card">
                <div class="card-title">Ahorro Total</div>
                <div class="value text-green" id="ahorro">$0</div>
            </div>
        </div>

        <div class="filter-bar">
            <label for="mesFiltro">📅 Filtrar y Reiniciar por Mes:</label>
            <input type="month" id="mesFiltro" onchange="aplicarFiltroMes()">
            <button class="btn-outline" onclick="limpiarFiltro()">Ver Todos</button>
        </div>

        <div class="actions">
            <button onclick="abrirModal()">➕ Nuevo Movimiento</button>
            <button class="btn-secondary" onclick="exportarExcel()">📊 Excel</button>
            <button class="btn-secondary" onclick="exportarCSV()">📄 CSV</button>
            <button class="btn-secondary" onclick="toggleDark()">🌙 Tema</button>
        </div>

        <div id="table"></div>

        <h2 style="text-align: center; margin-top: 40px;">Resumen del Mes Visual</h2>
        <div class="charts-grid">
            <div class="chart-container">
                <canvas id="graficoBarras"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="graficoTorta"></canvas>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalForm">
        <div class="modal">
            <h3>Registrar Movimiento</h3>
            <form id="formMovimiento">
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" id="m_fecha" required>
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="m_tipo" onchange="cambiarOpcionesCategoria()" required>
                        <option value="gasto">Gasto</option>
                        <option value="ingreso">Ingreso</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="m_categoria" required></select>
                </div>
                <div class="form-group">
                    <label>Monto ($)</label>
                    <input type="number" id="m_monto" min="1" required>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" id="m_descripcion" placeholder="Ej: Compra supermercado" required>
                </div>
                <div class="form-group">
                    <label>Cuenta</label>
                    <select id="m_cuenta" required>
                        <option value="Banco">Banco</option>
                        <option value="Efectivo">Efectivo</option>
                        <option value="Tarjeta de Crédito">Tarjeta de Crédito</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const categoriasGasto = ["Alimentación", "Transporte", "Vivienda", "Servicios", "Salud", "Ocio", "Educación", "Ahorro", "Otros"];
        const categoriasIngreso = ["Sueldo", "Negocio", "Inversión", "Otros Ingresos"];

        let datos = JSON.parse(localStorage.getItem("gastosExcel")) || [];

        const table = new Tabulator("#table", {
            data: datos,
            layout: "fitColumns",
            responsiveLayout: "collapse",
            reactiveData: true,
            pagination: "local",
            paginationSize: 10,
            initialSort:[{column:"fecha", dir:"desc"}],
            columns: [
                {formatter:"responsiveCollapse", width:30, minWidth:30, hozAlign:"center", resizable:false, headerSort:false},
                {title: "Fecha", field: "fecha", editor: "date", width: 110},
                {title: "Categoría", field: "categoria"},
                {title: "Descripción", field: "descripcion", editor: "input"},
                {title: "Cuenta", field: "cuenta"},
                {title: "Ingreso", field: "ingreso", editor: "number", formatter: "money", formatterParams: {symbol: "$", precision: 0}},
                {title: "Gasto", field: "gasto", editor: "number", formatter: "money", formatterParams: {symbol: "$", precision: 0}},
                {title: "Saldo", field: "saldo", mutator: (value, data) => (Number(data.ingreso) || 0) - (Number(data.gasto) || 0), formatter: "money", formatterParams: {symbol: "$", precision: 0}},
                {
                    title: "Acción", width: 80, hozAlign: "center", headerSort: false,
                    formatter: () => "🗑️",
                    cellClick: (e, cell) => {
                        if(confirm("¿Eliminar este registro?")){
                            cell.getRow().delete();
                            guardar();
                        }
                    }
                }
            ],
            cellEdited: function() { guardar(); }
        });

        table.on("dataFiltered", function(filters, rows){
            actualizarUI();
        });

        function guardar() {
            localStorage.setItem("gastosExcel", JSON.stringify(table.getData()));
            actualizarUI();
        }

        function aplicarFiltroMes() {
            const mesSeleccionado = document.getElementById("mesFiltro").value;
            if (mesSeleccionado) {
                table.setFilter("fecha", "like", mesSeleccionado);
            } else {
                table.clearFilter();
            }
        }

        function limpiarFiltro() {
            document.getElementById("mesFiltro").value = "";
            table.clearFilter();
        }

        function abrirModal() {
            document.getElementById('m_fecha').value = new Date().toISOString().split('T')[0];
            cambiarOpcionesCategoria();
            document.getElementById('m_monto').value = "";
            document.getElementById('m_descripcion').value = "";
            document.getElementById('modalForm').style.display = "flex";
        }

        function cerrarModal() { document.getElementById('modalForm').style.display = "none"; }

        function cambiarOpcionesCategoria() {
            const tipo = document.getElementById('m_tipo').value;
            const selectCat = document.getElementById('m_categoria');
            selectCat.innerHTML = "";
            const opciones = tipo === 'gasto' ? categoriasGasto : categoriasIngreso;
            opciones.forEach(cat => {
                let opt = document.createElement('option');
                opt.value = cat; opt.textContent = cat;
                selectCat.appendChild(opt);
            });
        }

        document.getElementById('formMovimiento').addEventListener('submit', function(e) {
            e.preventDefault();
            const tipo = document.getElementById('m_tipo').value;
            const monto = Number(document.getElementById('m_monto').value);
            
            const nuevoRegistro = {
                id: Date.now(),
                fecha: document.getElementById('m_fecha').value,
                categoria: document.getElementById('m_categoria').value,
                descripcion: document.getElementById('m_descripcion').value,
                cuenta: document.getElementById('m_cuenta').value,
                ingreso: tipo === 'ingreso' ? monto : 0,
                gasto: tipo === 'gasto' ? monto : 0
            };

            table.addData([nuevoRegistro], true);
            guardar();
            cerrarModal();
        });

        // --- Lógica del Cálculo de Saldo Anterior e Histórico ---
        function actualizarUI() {
            // Obtenemos TODOS los datos de la tabla, sin importar si están filtrados o no
            const allData = table.getData(); 
            const mesSeleccionado = document.getElementById("mesFiltro").value; // Ejemplo: "2024-05"
            
            let saldoAnterior = 0;
            let ahorroAnterior = 0;
            
            let ingresosMes = 0;
            let gastosMes = 0;
            let ahorroMes = 0;
            
            let gastosPorCategoria = {};

            allData.forEach(r => {
                let ingreso = Number(r.ingreso) || 0;
                let gasto = Number(r.gasto) || 0;
                let categoria = r.categoria || "Otros";
                let fecha = r.fecha || ""; // Ejemplo: "2024-05-15"

                let esMesActual = true;
                let esMesAnterior = false;

                // Evaluamos si el registro pertenece al mes filtrado o a un mes del pasado
                if (mesSeleccionado) {
                    if (fecha.startsWith(mesSeleccionado)) {
                        esMesActual = true;
                    } else if (fecha < mesSeleccionado + "-01") {
                        // Es de un mes estrictamente anterior al seleccionado
                        esMesAnterior = true;
                        esMesActual = false;
                    } else {
                        // Es de un mes en el futuro, lo ignoramos de la vista actual
                        esMesActual = false;
                    }
                }

                if (esMesAnterior) {
                    saldoAnterior += (ingreso - gasto);
                    if (categoria === "Ahorro") ahorroAnterior += (ingreso + gasto);
                }

                if (esMesActual) {
                    ingresosMes += ingreso;
                    gastosMes += gasto;
                    
                    if (categoria === "Ahorro") ahorroMes += (ingreso + gasto);
                    
                    if (gasto > 0 && categoria !== "Ahorro") {
                        gastosPorCategoria[categoria] = (gastosPorCategoria[categoria] || 0) + gasto;
                    }
                }
            });

            // Balance total incluye el saldo que se trae arrastrado
            let balanceTotal = saldoAnterior + ingresosMes - gastosMes;
            // El ahorro total siempre suma toda la historia hasta el mes actual
            let ahorroTotal = ahorroAnterior + ahorroMes;

            const formatMoney = (num) => "$" + num.toLocaleString('es-CL');
            
            document.getElementById("saldo-anterior").innerText = formatMoney(saldoAnterior);
            document.getElementById("ingresos").innerText = formatMoney(ingresosMes);
            document.getElementById("gastos").innerText = formatMoney(gastosMes);
            document.getElementById("balance").innerText = formatMoney(balanceTotal);
            document.getElementById("ahorro").innerText = formatMoney(ahorroTotal);

            actualizarGraficos(ingresosMes, gastosMes, gastosPorCategoria);
        }

        let chartBarras, chartTorta;

        function actualizarGraficos(ingresos, gastos, categorias) {
            const isDark = document.body.classList.contains('dark');
            Chart.defaults.color = isDark ? '#e5e7eb' : '#4b5563';

            const ctxBarras = document.getElementById("graficoBarras");
            if(chartBarras) chartBarras.destroy();
            chartBarras = new Chart(ctxBarras, {
                type: "bar",
                data: {
                    labels: ["Ingresos", "Gastos"],
                    datasets: [{
                        label: 'Monto del Mes',
                        data: [ingresos, gastos],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderRadius: 8
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: {display: false}, title: { display: true, text: 'Flujo de Caja del Periodo' } } }
            });

            const ctxTorta = document.getElementById("graficoTorta");
            if(chartTorta) chartTorta.destroy();
            chartTorta = new Chart(ctxTorta, {
                type: "doughnut",
                data: {
                    labels: Object.keys(categorias),
                    datasets: [{
                        data: Object.values(categorias),
                        backgroundColor: ['#ef4444', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#84cc16'],
                        borderWidth: isDark ? 0 : 2,
                        borderColor: isDark ? '#1e1e1e' : '#fff'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'Desglose de Gastos del Mes' } } }
            });
        }

        function exportarCSV() { table.download("csv", "gastos_familia.csv"); }
        function exportarExcel() { table.download("xlsx", "gastos_familia.xlsx", {sheetName: "Movimientos"}); }
        
        function toggleDark() { 
            document.body.classList.toggle("dark");
            localStorage.setItem("temaOscuro", document.body.classList.contains("dark"));
            actualizarUI();
        }

        if(localStorage.getItem("temaOscuro") === "true") document.body.classList.add("dark");
        
        // Poner automáticamente el mes actual en el filtro al entrar a la página
        document.getElementById("mesFiltro").value = new Date().toISOString().slice(0, 7);
        aplicarFiltroMes(); 
        
    </script>
</body>
</html>
